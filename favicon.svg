<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c6aff"/>
      <stop offset="100%" stop-color="#6af0ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Dark background -->
  <rect width="64" height="64" rx="12" fill="#08080f"/>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="url(#g)" stroke-width="1.5" opacity="0.5"/>
  <!-- Eye shape - outer -->
  <path d="M10 32 Q32 12 54 32 Q32 52 10 32Z" fill="none" stroke="url(#g)" stroke-width="1.8" filter="url(#glow)"/>
  <!-- Iris circle -->
  <circle cx="32" cy="32" r="8" fill="none" stroke="url(#g)" stroke-width="1.8" filter="url(#glow)"/>
  <!-- Pupil dot -->
  <circle cx="32" cy="32" r="3" fill="url(#g)" filter="url(#glow)"/>
  <!-- Small star rays -->
  <line x1="32" y1="8" x2="32" y2="14" stroke="url(#g)" stroke-width="1.2" opacity="0.6"/>
  <line x1="32" y1="50" x2="32" y2="56" stroke="url(#g)" stroke-width="1.2" opacity="0.6"/>
  <line x1="8" y1="32" x2="14" y2="32" stroke="url(#g)" stroke-width="1.2" opacity="0.6"/>
  <line x1="50" y1="32" x2="56" y2="32" stroke="url(#g)" stroke-width="1.2" opacity="0.6"/>
</svg>
